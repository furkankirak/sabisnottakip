name: SABIS Live Check

on:
  schedule:
    - cron: "5 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sabis-live-check
  cancel-in-progress: false

jobs:
  live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Repo cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright Chromium kur
        run: |
          python -m playwright install --with-deps chromium

      - name: Eski state cache'den yukle
        uses: actions/cache/restore@v4
        with:
          path: state_local.json
          key: sabis-state-${{ github.run_id }}
          restore-keys: |
            sabis-state-

      - name: Canli kontrol baslat
        env:
          SABIS_USERNAME: ${{ secrets.SABIS_USERNAME }}
          SABIS_PASSWORD: ${{ secrets.SABIS_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          GROUP_TOPIC_ID: ${{ secrets.GROUP_TOPIC_ID }}
        run: |
          python -u sabistakip.py

      - name: Yeni state'i cache'e kaydet
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state_local.json
          key: sabis-state-${{ github.run_id }}

      - name: State dosyasini artifact olarak yukle
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sabis-state
          path: state_local.json
          if-no-files-found: ignore